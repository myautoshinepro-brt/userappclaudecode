<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Building In Progress</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #d8eff2, #f3f6e8);
      font-family: Arial, Helvetica, sans-serif;
      color: #213a35;
      text-align: center;
    }

    .container {
      max-width: 540px;
      padding: 32px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.90);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.10);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 0.05em;
    }

    p {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.75;
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Building in progress</h1>
    <p>Please don't wait — we are working on something great and will be back soon.</p>
  </div>
</body>
</html>
