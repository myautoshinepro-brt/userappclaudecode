<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pitbay Center</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SW Center">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="description" content="Manage your Pitbay center — bookings, queue, slots and revenue.">

  <!-- Leaflet maps (OpenStreetMap — no API key needed) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/screens.css">
  <style>
    /* ────────── Base ────────── */
    body { display:flex; flex-direction:column; align-items:center; padding:8px; gap:10px; min-height:100vh; background:#e5e7eb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    /* Dev-only nav pills above the phone (hidden in mobile + desktop layouts) */
    .dev-nav-pills { display:none; }
    @media (min-width:481px) and (max-width:1023px) {
      /* Show only in mid-width "phone-shell on desktop" preview mode */
      .dev-nav-pills { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; max-width:375px; }
    }

    /* ────────── Phone-frame layout (mobile + tablet preview) ────────── */
    .app-shell { display:contents; }            /* default: no wrapper effect */
    .app-sidebar { display:none; }              /* hidden by default */
    .phone { width:375px; height:812px; background:#fff; border-radius:40px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 8px 40px rgba(0,0,0,.2); border:1.5px solid #d1d5db; position:relative; }
    @media (max-width:480px) {
      body { padding:0; }
      .phone { width:100vw; height:100dvh; border-radius:0; border:none; }
    }
    [data-screen] { position:absolute; inset:0; display:flex; flex-direction:column; background:#fff; visibility:hidden; pointer-events:none; }
    [data-screen].screen-active { visibility:visible; pointer-events:all; z-index:1; }

    /* ────────── Desktop layout: sidebar + full-bleed content (≥1024px) ────────── */
    @media (min-width: 1024px) {
      body {
        display:block; padding:0; gap:0;
        background:#f6f8fb;
        height:100vh; overflow:hidden;
      }
      .app-shell {
        display:flex !important; flex-direction:row;
        height:100vh; width:100vw;
      }
      .app-sidebar {
        display:flex !important; flex-direction:column;
        width:240px; flex-shrink:0;
        background:#0f172a; color:#e2e8f0;
        height:100vh; overflow-y:auto;
        padding:24px 0;
        font-size:14px;
      }
      .as-brand {
        display:flex; align-items:center; gap:10px;
        padding:0 22px 24px;
        font-size:18px; font-weight:800;
        color:#fff;
        border-bottom:1px solid rgba(255,255,255,0.08);
        margin-bottom:16px;
      }
      .as-brand-mark {
        width:34px; height:34px; border-radius:9px;
        background:linear-gradient(135deg,#1a73e8,#1e40af);
        display:flex; align-items:center; justify-content:center;
        font-size:16px;
      }
      .as-center-card {
        margin:0 14px 18px; padding:12px 14px;
        background:rgba(255,255,255,0.04); border-radius:10px;
      }
      .as-center-name {
        font-size:13px; font-weight:700; color:#fff;
        white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      }
      .as-center-sub {
        font-size:11px; color:#94a3b8; margin-top:2px;
        white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      }
      .as-section-label {
        font-size:10px; font-weight:700; color:#64748b;
        text-transform:uppercase; letter-spacing:0.06em;
        padding:14px 22px 6px;
      }
      .as-link {
        display:flex; align-items:center; gap:12px;
        padding:10px 22px;
        color:#cbd5e1; cursor:pointer;
        border-left:3px solid transparent;
        transition: background .15s, color .15s, border-color .15s;
      }
      .as-link:hover { background:rgba(255,255,255,0.04); color:#fff; }
      .as-link.active {
        background:rgba(26,115,232,0.18);
        color:#fff;
        border-left-color:#1a73e8;
      }
      .as-link-ico { font-size:16px; width:20px; text-align:center; }
      .as-spacer { flex:1; }
      .as-footer {
        padding:12px 22px; border-top:1px solid rgba(255,255,255,0.08);
        font-size:11px; color:#64748b;
      }

      /* Phone shell becomes a full-bleed content area on desktop */
      .phone {
        width:auto; height:100vh;
        border:none; border-radius:0;
        box-shadow:none;
        flex:1; min-width:0;
        background:#f6f8fb;
      }
      /* Hide the in-app bottom nav — sidebar replaces it */
      .phone .bottom-nav { display:none !important; }

      /* Constrain content inside scrollable screens for readability */
      [data-screen] .scroll-area > * { max-width:1200px; }
      [data-screen] .scroll-area { padding-left:8px; padding-right:8px; }

      /* ── Public screens (login + onboard) — centered card on desktop ── */
      /* Without a sidebar, the .phone would otherwise stretch full-width,
         making the login form look lost in a sea of white space. */
      body.on-public-screen {
        background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 35%, #ffffff 65%, #eef2ff 100%);
        height: 100vh;
        overflow: auto;
      }
      body.on-public-screen .app-shell {
        align-items: center; justify-content: center;
        min-height: 100vh; height: auto;
        padding: 32px 16px;
      }
      body.on-public-screen .phone {
        flex: 0 0 auto;
        width: 460px; max-width: 460px;
        height: auto; max-height: calc(100vh - 64px);
        border-radius: 20px; overflow: hidden;
        box-shadow: 0 24px 80px rgba(15,23,42,0.18),
                    0 4px 16px rgba(15,23,42,0.08);
        border: 1px solid rgba(15,23,42,0.06);
      }
      /* Login/onboard cascade fix on desktop centered-card layout.
         .scroll-area + .login-card both use `flex: 1` which collapses to
         0px when the parent (.phone) is auto-height — the form was there
         in the DOM but invisible. Override to size-to-content. */
      body.on-public-screen .phone {
        overflow: auto;            /* let the card scroll if content is tall */
      }
      body.on-public-screen [data-screen] {
        position: relative;        /* was absolute fill */
        height: auto;
      }
      body.on-public-screen [data-screen] .scroll-area {
        flex: none;
        overflow: visible;         /* don't make inner card height:0 */
      }
      body.on-public-screen .login-screen { min-height: auto; }
      body.on-public-screen .login-card   { flex: none; }
    }
</head>
<body>

<!-- Dev nav pills — hidden in production layouts via CSS .dev-nav-pills -->
<div class="dev-nav-pills">

  <div class="nav-pill" data-screen="onboard"         onclick="Router.go('onboard')"         style="font-size:10px;padding:4px 10px;border-radius:18px;border:.5px solid #d1d5db;cursor:pointer">🏪 Apply</div>
  <div class="nav-pill" data-screen="dashboard"       onclick="Router.go('dashboard')"       style="font-size:10px;padding:4px 10px;border-radius:18px;border:.5px solid #d1d5db;cursor:pointer">📊 Dashboard</div>
  <div class="nav-pill" data-screen="bookings"        onclick="Router.go('bookings')"        style="font-size:10px;padding:4px 10px;border-radius:18px;border:.5px solid #d1d5db;cursor:pointer">📋 Bookings</div>
  <div class="nav-pill" data-screen="queue"           onclick="Router.go('queue')"           style="font-size:10px;padding:4px 10px;border-radius:18px;border:.5px solid #d1d5db;cursor:pointer">🚗 Queue</div>
  <div class="nav-pill" data-screen="slots"           onclick="Router.go('slots')"           style="font-size:10px;padding:4px 10px;border-radius:18px;border:.5px solid #d1d5db;cursor:pointer">🕐 Slots</div>

</div>

<script>
  // ── Capacitor / native shell setup ───────────────────────────────
  // When the app is running as a packaged Android APK the WebView loads
  // from https://localhost, so relative `/api/...` calls would hit
  // localhost instead of our deployed backend. Override fetch to prepend
  // the deployed center-app URL when we're on the native shell.
  window.API_URL = 'https://userappclaudecode-production-7ece.up.railway.app';
  (function() {
    const isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
    if (!isNative) return; // Web build talks to its own origin via relative URLs.
    const orig = window.fetch;
    window.fetch = function(resource, options) {
      if (typeof resource === 'string' && resource.startsWith('/api/')) {
        resource = (window.API_URL || '') + resource;
      }
      return orig(resource, options);
    };
  })();

  if (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) {
    const { StatusBar, SplashScreen, App } = window.Capacitor.Plugins;
    if (StatusBar) {
      StatusBar.setOverlaysWebView({ overlay: false });
      StatusBar.setBackgroundColor({ color: '#0f172a' });
      StatusBar.setStyle({ style: 'DARK' });
    }
    if (SplashScreen) setTimeout(() => SplashScreen.hide(), 500);

    // Android hardware back button + gesture-nav swipe. The OS consumes
    // both before they reach the WebView so we have to listen here.
    if (App) {
      App.addListener('backButton', () => {
        if (typeof Router !== 'undefined' && Router.back) {
          // If we're already on the root screen, exit the app instead
          // of looping inside the same screen forever.
          const rootScreens = ['dashboard', 'login', 'onboard'];
          if (rootScreens.includes(Router.current)) { App.exitApp(); return; }
          Router.back();
        }
      });
    }
  }

  // Boot
  Router.init();

  // Set date labels
  const _dateLabel = todayLabel();
  const _dateEls = ['dash-date-label','bookings-date-sub','queue-date-sub','slots-date-sub'];
  _dateEls.forEach(id => { const el = document.getElementById(id); if(el) el.textContent = _dateLabel; });

  // Restore session or show login
  Auth.init().then(() => {
    if (!AppState.token) Auth.renderLogin();
  });
</script>

    });

</script>
