# Fly.io config for center-app
# Deploy with: cd center-app && flyctl deploy
# Mumbai region (`bom`) — same as customer-app, for minimum cross-app latency.

app            = 'pitbay-center'   # CHANGE if "pitbay-center" is globally taken
primary_region = 'bom'

[build]
  # Dockerfile in this dir (better-sqlite3 needs native build tools)

[env]
  PORT      = '3001'
  HOST      = '0.0.0.0'
  NODE_ENV  = 'production'
  DB_PATH   = '/data/sparkwash-center.sqlite'
  DEV_MODE  = 'true'
  CORS_ORIGIN = '*'
  # JWT_SECRET and any future SMS/email keys go via `flyctl secrets set`.

[http_service]
  internal_port       = 3001
  force_https         = true
  # IMPORTANT: leave this running 24/7 — customer-app proxies live API
  # calls to it. If we let it idle and stop, every customer-app request
  # eats a ~2s cold start.
  auto_stop_machines  = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period  = '15s'
    interval      = '30s'
    timeout       = '5s'
    method        = 'GET'
    path          = '/health'

# Persistent volume for the SQLite DB — holds CENTERS, BOOKINGS,
# PACKAGES, REVIEWS, SLOTS, CHAT, OWNER ACCOUNTS. Critical data.
# Create once: flyctl volumes create center_app_data --size 1 --region bom
[mounts]
  source      = 'center_app_data'
  destination = '/data'

[[vm]]
  size   = 'shared-cpu-1x'
  memory = '512mb'   # a bit more headroom — center-app holds more state
